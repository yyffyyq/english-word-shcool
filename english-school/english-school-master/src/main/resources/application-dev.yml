spring:
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/englishworddb
    username: root
    password: root
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 72000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
server:
  port: 8081
  servlet:
    context-path: /api
    multipart:
      # 大小限制
      max-file-size: 10MB
debug: true

